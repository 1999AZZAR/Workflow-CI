name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy joblib
      - name: Run MLflow Project
        run: |
          export MLFLOW_ALLOW_FILE_STORE=true
          mlflow run MLProject --env-manager=local
      - name: Save Training Artifacts to Repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mlruns/ || echo "mlruns not created"
          git commit -m "chore: save training artifacts to repository" || echo "No changes to commit"
          git push || echo "Push failed"
      - name: Build Docker Model
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "heart-disease-model" --env-manager=local
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Tag Docker Image
        run: |
          docker tag heart-disease-model ${{ secrets.DOCKER_HUB_USERNAME }}/heart-disease-model:latest
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/heart-disease-model:latest
